  <ellipse cx="38.8" cy="38.5" rx="3.7" ry="4.3" fill="#64b5e8" stroke="#49454f" stroke-width="1.7" />
  <ellipse cx="25.8" cy="39.2" rx="1.15" ry="2" fill="#594a2e" />
  <ellipse cx="38.2" cy="39.2" rx="1.15" ry="2" fill="#244966" />
  <circle cx="24.3" cy="36.9" r="1" fill="#fff" />
