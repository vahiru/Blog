  <path d="M18.5 31c-2.2 5-2 12.5 1 18.5 2.3-4.5 3-10.5 2.2-17.5Z" fill="#f7f2fa" stroke="#49454f" stroke-width="2" />
  <path d="M45.5 31c2.2 5 2 12.5-1 18.5-2.3-4.5-3-10.5-2.2-17.5Z" fill="#f7f2fa" stroke="#49454f" stroke-width="2" />

